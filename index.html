<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Reverse Tool</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 16px 32px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .container {
      display: flex;
      gap: 16px;
      padding: 24px 32px;
      flex: 1;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .panel-label {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    textarea {
      flex: 1;
      width: 100%;
      min-height: calc(100vh - 180px);
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.6;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }

    textarea:focus {
      border-color: #6c63ff;
    }

    #output {
      background: #f8f9ff;
      color: #333;
      cursor: default;
      user-select: text;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-label {
      flex: 1;
    }

    button {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-copy {
      background: #6c63ff;
      color: white;
    }

    .btn-copy:hover { background: #5a52d5; }
    .btn-copy.copied { background: #22c55e; }

    .btn-clear {
      background: #e5e7eb;
      color: #555;
    }

    .btn-clear:hover { background: #d1d5db; }

    .count {
      font-size: 12px;
      color: #888;
    }

    @media (max-width: 640px) {
      .container { flex-direction: column; padding: 16px; }
      textarea { min-height: 40vh; }
    }
  </style>
</head>
<body>

<header>🔃 Reverse Tool</header>

<div class="container">
  <!-- INPUT -->
  <div class="panel">
    <div class="toolbar">
      <span class="panel-label">Input</span>
      <span class="count" id="count-in">0 baris</span>
      <button class="btn-clear" onclick="clearInput()">Clear</button>
    </div>
    <textarea id="input" placeholder="Paste data di sini...&#10;&#10;Contoh:&#10;1&#10;2&#10;3&#10;4&#10;5" oninput="reverse()"></textarea>
  </div>

  <!-- OUTPUT -->
  <div class="panel">
    <div class="toolbar">
      <span class="panel-label">Result</span>
      <span class="count" id="count-out">0 baris</span>
      <button class="btn-copy" id="btn-copy" onclick="copyOutput()">Copy</button>
    </div>
    <textarea id="output" readonly placeholder="Hasil akan muncul di sini..."></textarea>
  </div>
</div>

<script>
  function formatNumber(val) {
    const trimmed = val.trim();
    // Cek apakah input adalah PURE NUMBER (hanya digit, titik, koma, minus)
    // Jika ada huruf/karakter lain, kembalikan apa adanya
    const hasLetters = /[a-zA-Z]/i.test(trimmed);
    if (hasLetters) return trimmed; // ada huruf, tidak format
    
    // Hapus koma existing (jika ada)
    const cleaned = trimmed.replace(/,/g, '');
    const num = parseFloat(cleaned);
    if (isNaN(num)) return trimmed; // bukan angka, kembalikan apa adanya
    
    // Kali 1000, lalu format: thousand separator + 2 desimal
    return (num * 1000).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function reverse() {
    const raw = document.getElementById('input').value;
    const lines = raw.split('\n');
    const reversed = [...lines].reverse();
    const formatted = reversed.map(line => line.trim() === '' ? '' : formatNumber(line));
    const result = formatted.join('\n');

    document.getElementById('output').value = result;
    document.getElementById('count-in').textContent = lines.length + ' baris';
    document.getElementById('count-out').textContent = reversed.length + ' baris';
  }

  function copyOutput() {
    const output = document.getElementById('output');
    const text = output.value;
    if (!text) return;

    // Copy as plain text
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('btn-copy');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function clearInput() {
    document.getElementById('input').value = '';
    document.getElementById('output').value = '';
    document.getElementById('count-in').textContent = '0 baris';
    document.getElementById('count-out').textContent = '0 baris';
  }
</script>

</body>
</html>
